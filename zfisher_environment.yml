name: zFISHer
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Conda provides only what pip handles poorly on Windows and what is NOT a
  # pyproject.toml dependency, so no version is pinned in two places:
  #   - the Python interpreter itself
  #   - the CPU-only PyTorch stack (cellpose's backend; pip tends to pull a CUDA build)
  - python=3.10.19
  - pytorch=2.3.1
  - torchvision=0.18.1
  - cpuonly
  - pip
  - pip:
    # Everything else (napari, PySide6, numpy, scipy, scikit-image, pandas,
    # SimpleITK, cellpose, nd2, openpyxl, magicgui, tifffile, qtpy, markdown,
    # packaging, Pillow) is resolved from pyproject.toml — the single source of
    # truth for Python-package versions.
    - -e .
